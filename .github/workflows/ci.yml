name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  node:
    name: Node lint / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      - run: pnpm lint || echo "lint warnings — non-blocking in Phase 1"
      - run: pnpm lint:copy
      - run: pnpm test || echo "no JS tests yet"

  python:
    name: Python lint / typecheck / test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plate
          POSTGRES_PASSWORD: plate
          POSTGRES_DB: plate_clean
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U plate -d plate_clean"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+asyncpg://plate:plate@localhost:5432/plate_clean
      DATABASE_URL_SYNC: postgresql://plate:plate@localhost:5432/plate_clean
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci_test_secret_ci_test_secret_xxxxxxx
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - working-directory: apps/api
        run: pip install -e ".[dev]"
      - working-directory: apps/api
        run: ruff check app tests
      - working-directory: apps/api
        run: mypy app || echo "mypy warnings — non-blocking in Phase 1"
      - working-directory: apps/api
        run: alembic upgrade head
      - working-directory: apps/api
        run: pytest --cov=app --cov-report=term-missing

  vision:
    name: Vision service lint / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - working-directory: services/vision
        run: pip install -e ".[dev]"
      - working-directory: services/vision
        run: ruff check app tests
      - working-directory: services/vision
        run: mypy app || echo "mypy warnings — non-blocking in Phase 1"
      - working-directory: services/vision
        env:
          VISION_BACKEND: stub
        run: pytest

  e2e:
    name: Playwright e2e smoke
    runs-on: ubuntu-latest
    needs: [node]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Install Playwright browsers
        run: pnpm --filter @plate-clean/web test:e2e:install
      - name: Build web bundle
        run: pnpm --filter @plate-clean/web build
      - name: Run Playwright smoke
        run: pnpm --filter @plate-clean/web test:e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  docker-build:
    name: Build images
    runs-on: ubuntu-latest
    needs: [node, python, vision]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t plate-clean-api ./apps/api
      - run: docker build -t plate-clean-vision ./services/vision
