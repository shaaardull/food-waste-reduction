name: Build and push Vision image

on:
  push:
    branches: [main, master]
    paths:
      - 'services/vision/**'
      - '.github/workflows/build-vision.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./services/vision
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/plateclean-vision:latest
            ghcr.io/${{ github.repository_owner }}/plateclean-vision:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
