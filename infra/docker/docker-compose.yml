name: plate-clean

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: plate
      POSTGRES_PASSWORD: plate
      POSTGRES_DB: plate_clean
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plate -d plate_clean"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://plate:plate@postgres:5432/plate_clean
      DATABASE_URL_SYNC: postgresql://plate:plate@postgres:5432/plate_clean
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             gunicorn app.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 -w 2"

  worker:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://plate:plate@postgres:5432/plate_clean
      DATABASE_URL_SYNC: postgresql://plate:plate@postgres:5432/plate_clean
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=2

  beat:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://plate:plate@postgres:5432/plate_clean
      DATABASE_URL_SYNC: postgresql://plate:plate@postgres:5432/plate_clean
      REDIS_URL: redis://redis:6379/0
    depends_on:
      worker:
        condition: service_started
    command: celery -A app.celery_app.celery_app beat --loglevel=info

  vision:
    # Phase 2 inference microservice (CLAUDE.md §6.2). Defaults to the
    # 'stub' backend so it can run without an Anthropic key or trained model.
    # Flip apps/api's USE_VISION_SERVICE=true to route traffic through here.
    build:
      context: ../../services/vision
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    environment:
      VISION_BACKEND: stub
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  minio-data:
